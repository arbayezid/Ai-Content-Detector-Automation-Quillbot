<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Detector</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <div style="width: 24px; height: 24px; background: linear-gradient(135deg, #60a5fa, #a78bfa); border-radius: 6px; display: flex; align-items: center; justify-content: center;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M2 12h20"></path>
                </svg>
            </div>
            <h1>AI Detector</h1>
        </header>

        <div class="status-card">
            <div class="status-header">
                <span>Status</span>
                <span id="status-text" class="status-idle">Idle</span>
            </div>
            <div class="progress-container">
                <div id="item-progress" class="progress-bar"></div>
            </div>
            <div id="timer-section" class="timer-section" style="display: none;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span>Tab refresh in: <span id="timer-countdown">5:00</span></span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-label">Total</span>
                <span id="stats-total" class="stat-number">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Progress</span>
                <span id="stats-pending" class="stat-number">0/0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Completed</span>
                <span id="stats-completed" class="stat-number" style="color: var(--success-color)">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Errors</span>
                <span id="stats-errors" class="stat-number" style="color: var(--danger-color)">0</span>
            </div>
        </div>

        <div class="option-row">
            <label class="toggle-label" for="json-parse-toggle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
                Parse JSON to Text
            </label>
            <label class="toggle-switch">
                <input type="checkbox" id="json-parse-toggle">
                <span class="toggle-slider"></span>
            </label>
        </div>

        <div class="option-row">
            <label class="toggle-label" for="word-limit-input">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="15" y2="12"></line>
                    <line x1="3" y1="18" x2="18" y2="18"></line>
                </svg>
                Word Limit
            </label>
            <input type="number" id="word-limit-input" min="100" max="10000" placeholder="1300" style="width:70px;padding:4px 8px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:6px;color:var(--text-primary);font-size:13px;text-align:center;">
        </div>

        <div class="upload-card">
            <div class="upload-header">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span>Input XLSX</span>
            </div>
            <label class="file-picker" for="xlsx-file-input">
                <input type="file" id="xlsx-file-input" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
                <span>Choose XLSX File</span>
            </label>
            <div id="selected-file-status" class="file-status">No file selected</div>
            <div id="xlsx-selectors" class="xlsx-selectors" style="display: none;">
                <div class="select-input-group">
                    <label for="sheet-select">Sheet</label>
                    <select id="sheet-select"></select>
                </div>
                <div class="select-input-group">
                    <label for="input-column-select">Input Column</label>
                    <select id="input-column-select"></select>
                </div>
            </div>
        </div>

        <div class="row-range-card">
            <div class="row-range-header">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                <span>Row Range</span>
            </div>
            <div class="row-range-inputs">
                <div class="row-input-group">
                    <label for="start-row">Start</label>
                    <input type="number" id="start-row" min="1" placeholder="1">
                </div>
                <div class="row-input-separator">to</div>
                <div class="row-input-group">
                    <label for="end-row">End</label>
                    <input type="number" id="end-row" min="1" placeholder="All">
                </div>
            </div>
            <div class="row-range-hint">Leave empty for all rows</div>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                Start
            </button>
            <button id="stop-btn" class="btn btn-danger" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
                Stop
            </button>
        </div>

        <div class="controls" style="margin-top: 8px;">
            <button id="download-btn" class="btn btn-secondary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Download Results CSV
            </button>
        </div>

        <div class="controls" style="margin-top: 8px;">
            <button id="reload-btn" class="btn btn-secondary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                Reload from XLSX
            </button>
        </div>

        <div class="controls" style="margin-top: 8px;">
            <button id="clear-btn" class="btn btn-danger-outline">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
                Clear All Data
            </button>
        </div>

        <footer>
            AI Content Detection Extension
        </footer>
    </div>
    <script src="xlsx.min.js"></script>
    <script src="xlsx-loader.js"></script>
    <script src="popup.js"></script>
</body>
</html>
